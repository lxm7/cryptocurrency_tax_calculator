services:
  # Postgres is managed by Neon — no local service. DATABASE_URL points at Neon.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_DIRECT: ${DATABASE_URL_DIRECT}
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
    ports:
      - "8000:8000"

  flask:
    build: ./webhooks
    ports:
      - "5000:5000"

  web:
    build: ./web
    depends_on:
      - api
    environment:
      # Server-side only: Next route handlers proxy to FastAPI on the compose net.
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
